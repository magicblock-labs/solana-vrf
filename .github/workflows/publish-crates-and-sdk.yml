name: Publish Crates & SDKs
on:
  release:
    types: [published]
  push:
    branches:
      - "release/v*"
  workflow_dispatch:

env:
  rust_version: 1.93.0

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: install essentials
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config build-essential libudev-dev
          npm install --global yarn

      - name: Install Rust
        shell: "bash"
        run: |
          rustup toolchain install ${{ env.rust_version }} --profile minimal
          rustup default ${{ env.rust_version }}

  lint:
    needs: install
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        shell: "bash"
        run: |
          rustup toolchain install ${{ env.rust_version }} --profile minimal
          rustup default ${{ env.rust_version }}
          rustup component add rustfmt clippy --toolchain ${{ env.rust_version }}
      - name: Run fmt
        run: cargo fmt -- --check

      - name: Run clippy
        run: cargo clippy -- --deny=warnings

  publish:
    needs: [install, lint]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        shell: "bash"
        run: |
          rustup toolchain install ${{ env.rust_version }} --profile minimal
          rustup default ${{ env.rust_version }}

      - name: run build
        run: |
          cargo build

      - name: Set DRY_RUN based on trigger
        run: echo "DRY_RUN=true" >> $GITHUB_ENV
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/heads/release/v')

      - name: cargo publish
        run: |
          if [ "${DRY_RUN}" = "true" ]; then
            cargo publish --dry-run --manifest-path=sdk/vrf-macro/Cargo.toml --token $CRATES_TOKEN --no-verify
            cargo publish --dry-run --manifest-path=sdk/pinocchio/Cargo.toml --token $CRATES_TOKEN --no-verify
            # Dry-run does not upload the macro crate, so patch crates.io to resolve
            # the SDK's same-version macro dependency from the local workspace.
            cargo publish --dry-run --manifest-path=sdk/Cargo.toml --token $CRATES_TOKEN --no-verify --config 'patch.crates-io.ephemeral-vrf-sdk-vrf-macro.path="sdk/vrf-macro"'
          else
            cargo publish --manifest-path=sdk/vrf-macro/Cargo.toml --token $CRATES_TOKEN
            cargo publish --manifest-path=sdk/Cargo.toml --token $CRATES_TOKEN
            cargo publish --manifest-path=sdk/pinocchio/Cargo.toml --token $CRATES_TOKEN
          fi
        env:
          CRATES_TOKEN: ${{ secrets.CRATES_TOKEN }}
          DRY_RUN: ${{ env.DRY_RUN }}
